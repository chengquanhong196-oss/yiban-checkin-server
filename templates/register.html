{% extends "base.html" %}
{% block title %}注册 — 易班云签到{% endblock %}
{% block content %}
<div class="form-card">
    <h1>注册</h1>
    <form method="POST" action="/register">
        <label>邮箱</label>
        <input type="email" name="email" placeholder="your@email.com" required autofocus>
        <label>密码</label>
        <input type="password" name="password" placeholder="至少 6 位" required minlength="6">
        <label>手机号（选填）</label>
        <input type="tel" name="phone" placeholder="用于签到，11 位数字" pattern="1[0-9]{10}">
        <button type="submit" class="btn btn-primary">注册</button>
    </form>
    <p class="form-footer">已有账号？<a href="/login">登录</a></p>
</div>
{% endblock %}
