<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}易班云签到{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="logo">☁️ 易班云签到</a>
            <div class="nav-links">
                {% if user %}
                <a href="/dashboard">控制台</a>
                <a href="/config">签到配置</a>
                <a href="/history">签到记录</a>
                <a href="/logout">退出</a>
                {% else %}
                <a href="/login">登录</a>
                <a href="/register">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>yiban-checkin · 仅供学习交流 · <a href="https://github.com">GitHub</a></p>
    </footer>
</body>
</html>
